# Cloudflare Pages – Konfiguration
# Statische Assets kommen aus ./dist (Vite-Build), die API aus ./functions.
name = "energieflow"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"

# Persistenz: ein KV-Namespace, Binding-Name "DB" (in den Functions: env.DB).
# Lokal (wrangler pages dev) wird automatisch ein lokaler KV-Store benutzt –
# die IDs unten sind nur für das echte Deployment nötig:
#   1) Namespace anlegen:   npx wrangler kv namespace create DB
#                           npx wrangler kv namespace create DB --preview
#   2) Die ausgegebenen IDs hier eintragen (oder im Pages-Dashboard binden).
[[kv_namespaces]]
binding = "DB"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"
